name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Gates — oxlint, oxfmt, typecheck (all files)
        run: hk check --all

      - name: Build all workspaces
        run: mise run '//...:build'

      - name: Package shape — publint + attw
        run: mise run '//...:check-package'

      - name: Manifest drift + prose validation
        run: mise run manifest-check

  intent-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The gate diffs against the PR base — it needs history.
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Release intent gates
        run: bun internal/release/src/cli.ts gate --base "origin/${{ github.base_ref }}"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Unit and pattern tests
        run: mise run '//...:test'

  vrt:
    runs-on: ubuntu-latest
    # The same pinned image tooling/vrt.sh runs locally — keep the tag in
    # lockstep with @playwright/test in apps/vrt/package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v7

      # CI verifies reproducibility, not change: re-render and fail on any
      # mismatch with committed baselines (ADR-0006).
      - name: VRT + axe against committed baselines
        run: bash apps/vrt/tooling/vrt-inner.sh

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vrt-report
          path: |
            apps/vrt/playwright-report
            apps/vrt/test-results
