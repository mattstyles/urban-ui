[tasks.build]
description = "Compile to dist/ via tsc"
run = "bun run build"
sources = ["src/**/*", "tsconfig.json", "tsconfig.base.json", "package.json"]
outputs = ["dist/**/*"]

[tasks.typecheck]
description = "Typecheck without emitting"
run = "bun run typecheck"

[tasks.lint]
description = "oxlint over package sources"
run = "bun run lint"
