monorepo_root = true

[monorepo]
config_roots = ["apps/*", "packages/*", "internal/*"]

[settings]
task.source_freshness_hash_contents = true

[tools]
bun = "1.3.14"
hk = "1.49.0"
# Lossless PNG recompression for committed VRT baselines (ADR-0006)
oxipng = "10.1.1"
"github:gastownhall/beads" = "1.1.0"
"npm:@kitlangton/stack" = "0.4.2"

[hooks]
postinstall = "hk install --mise"

# Manifests are a cross-package concern (name uniqueness, the labs direction
# rule), so generation and the drift gate live at the root, not per package.
[tasks.manifest]
description = "Generate urban-manifest.json for every urban package"
run = "bun internal/extractor/src/cli.ts generate"

[tasks.manifest-check]
description = "Fail on manifest drift or prose/graph violations (CI gate)"
run = "bun internal/extractor/src/cli.ts check"

[tasks.publish-rehearsal]
description = "Publish rehearsal — pack, verify rewrites, publint/attw, dry-run publish"
depends = ["//packages/theme:build", "//packages/react:build"]
run = "bun internal/release/src/cli.ts publish --rehearsal"

[tasks.consumer-smoke]
description = "Install packed tarballs into a scratch Vite consumer and build"
depends = ["//packages/theme:build", "//packages/react:build"]
run = "bun internal/release/src/cli.ts consumer-smoke"
