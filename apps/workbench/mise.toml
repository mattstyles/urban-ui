[tasks.build]
description = "Vite production build (compiles StyleX from installed packages)"
depends = ["//packages/theme:build", "//packages/react:build", "//packages/labs:build"]
run = "bun run build"
# The workbench consumes the packages like a real app: production builds
# resolve @urban-ui/* to built dist, so package dist is a build input.
sources = [
  "src/**/*",
  "index.html",
  "vite.config.ts",
  "tsconfig.json",
  "package.json",
  "../../internal/config/src/vite.ts",
  "../../packages/*/dist/**/*",
]
outputs = ["dist/**/*"]

[tasks.dev]
description = "Vite dev server"
depends = ["//packages/theme:build", "//packages/react:build", "//packages/labs:build"]
run = "bun run dev"

[tasks.typecheck]
description = "Typecheck without emitting"
depends = ["//packages/theme:build", "//packages/react:build", "//packages/labs:build"]
run = "bun run typecheck"

[tasks.lint]
description = "oxlint over app sources"
run = "bun run lint"
