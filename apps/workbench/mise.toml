[tasks.build]
description = "Vite production build (compiles StyleX from installed packages)"
depends = ["//packages/theme:build", "//packages/react:build"]
run = "bun run build"
# Scenes and examples are globbed straight from package sources, so they are
# build inputs here even though they never ship in the packages' dist.
sources = [
  "src/**/*",
  "tooling/**/*",
  "index.html",
  "vite.config.ts",
  "tsconfig.json",
  "package.json",
  "../../packages/*/src/**/*.visual.tsx",
  "../../packages/*/src/**/examples/*",
]
outputs = ["dist/**/*"]

[tasks.dev]
description = "Vite dev server"
depends = ["//packages/theme:build", "//packages/react:build"]
run = "bun run dev"

[tasks.typecheck]
description = "Typecheck without emitting"
depends = ["//packages/theme:build", "//packages/react:build"]
run = "bun run typecheck"

[tasks.lint]
description = "oxlint over app sources"
run = "bun run lint"

[tasks.vrt]
description = "Playwright VRT + axe in the pinned container; pass -- --update to regenerate baselines"
run = "bash tooling/vrt.sh"
